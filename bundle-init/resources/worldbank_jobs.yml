resources:
  jobs:
    worldbank_zerobus_job:
      name: ${bundle.target}_worldbank_zerobus_ingest

      tasks:
        - task_key: ingest_worldbank
          job_cluster_key: job_cluster
          spark_python_task:
            python_file: ../src/producers/worldbank_zerobus_producer.py
          libraries:
            - pypi:
                package: databricks-zerobus-ingest-sdk

      job_clusters:
        - job_cluster_key: job_cluster
          new_cluster:
            spark_version: 14.3.x-scala2.12
            node_type_id: Standard_DS3_v2
            autoscale:
              min_workers: 1
              max_workers: 2  