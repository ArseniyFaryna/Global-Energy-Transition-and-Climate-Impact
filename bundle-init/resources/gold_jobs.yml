resources:
  pipelines:
    energy_gold_pipeline:
      name: ${bundle.target}_energy_gold
      libraries:
        - file:
            path: ../src/gold_dlt/energy_wb_gold_dlt.py
      
      configuration:
        spark.ember_api_key: "{{secrets/tokariev-scope/ember-api-key}}"
      
      catalog: energy_trans_dev
      schema: gold
      clusters:
        - label: default
          node_type_id: Standard_DS3_v2
          autoscale:
            min_workers: 1
            max_workers: 2