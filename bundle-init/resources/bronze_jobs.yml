resources:
  jobs:
    energy_bronze_ingestion:
      name: ${bundle.target}_bronze_ingestion
      job_clusters:
        - job_cluster_key: bronze_cluster
          new_cluster:
            node_type_id: Standard_DS3_v2
            num_workers: 2
            spark_version: 15.4.x-scala2.12

      tasks:
        - task_key: ingest_ember_energy_api
          job_cluster_key: bronze_cluster
          spark_python_task:
            python_file: ../src/bronze/ingest.py
          libraries:
            - file: ../src
