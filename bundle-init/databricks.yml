# Declarative Automation Bundle configuration, more info here: https://docs.databricks.com/en/dev-tools/bundles/settings.html
bundle:
  name: "bundle-init"

include:
  - resources/*.yml
  - resources/*/*.yml

targets:
  # The 'dev' target, for development purposes. This target is the default. 
  dev:
    mode: development
    default: true
    workspace:
      host: https://adb-7405605185991044.4.azuredatabricks.net
      root_path: /Shared/energy-project/${bundle.name}/${workspace.current_user.short_name}/${bundle.target}

  # The 'prod' target, used for production deployment.
  prod:
    mode: production
    workspace:
      host: https://adb-7405605185991044.4.azuredatabricks.net
      # Shared path for team development
      root_path: /Shared/energy-project/.bundle/${bundle.name}/${bundle.target}